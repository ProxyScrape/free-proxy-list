name: Update proxy list

# The scheduled cron was removed in favor of a server-side cron driving
# scripts/update-and-push.sh (see README "Server cron setup"). GitHub
# Actions' scheduler is too unreliable at the documented 5-minute minimum —
# in practice we saw first-run delays of 30–60+ minutes and uneven cadence
# afterward. The manual dispatch and push triggers remain as a fallback so
# the workflow can still be invoked from the GitHub UI if the server cron
# is down.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/update.py"
      - ".github/workflows/update.yml"

# Cancel any older in-flight run if a new tick arrives while the previous one
# is still going — keeps the history clean and avoids fighting over the same
# files on slow API responses.
concurrency:
  group: update-proxy-list
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh proxy data
        run: python scripts/update.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes — upstream list is unchanged this tick."
            exit 0
          fi
          TS=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          git add proxies/
          git commit -m "chore(data): automatic update — $TS"
          git push
